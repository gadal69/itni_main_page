<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이트 제작 중</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1f2937, #111827);
            color: #ffffff;
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.85;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .contact {
            margin-top: 20px;
            font-size: 0.95rem;
            opacity: 0.7;
        }

        .contact a {
            color: #60a5fa;
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚧🚧</div>
        <h1>아이티엔아이 사이트 준비중입니다</h1>
        <p>
            현재 아이티엔아이 사이트 준비 중입니다.<br>
            빠른 시일 내에 찾아뵙겠습니다.
        </p>
        <div class="contact">
            문의: <a href="mailto:your@email.com">itni0123@daum.net</a>
        </div>
    </div>
</body>
</html>
